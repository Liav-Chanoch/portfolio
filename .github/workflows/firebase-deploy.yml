name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify and deploy to Firebase
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          # Validate the secret is present and valid JSON
          echo "$FIREBASE_SERVICE_ACCOUNT" | python3 -c "
          import json, sys
          try:
            d = json.load(sys.stdin)
            print('Credential type:', d.get('type'))
            print('Project:', d.get('project_id'))
          except Exception as e:
            print('ERROR: Invalid JSON in FIREBASE_SERVICE_ACCOUNT secret:', e)
            sys.exit(1)
          "

          # Write credentials file
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/sa.json

          # Deploy
          npm install -g firebase-tools
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json firebase deploy --only hosting --project xov---game --non-interactive
          rm /tmp/sa.json
