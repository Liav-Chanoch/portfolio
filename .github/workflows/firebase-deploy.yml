name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Test Google OAuth connectivity
        run: |
          echo "Testing Google OAuth endpoint..."
          curl -s -m 10 -o /dev/null -w "HTTP %{http_code}\n" https://oauth2.googleapis.com/token || echo "curl failed with exit $?"
          echo "Testing Firebase API..."
          curl -s -m 10 -o /dev/null -w "HTTP %{http_code}\n" https://firebase.googleapis.com/ || echo "curl failed with exit $?"
      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/sa.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json firebase deploy --only hosting --project xov---game --non-interactive --debug 2>&1 | head -80
          rm -f /tmp/sa.json
